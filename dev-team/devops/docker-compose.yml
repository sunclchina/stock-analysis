# =============================================================================
# 股票分析与投资决策系统 — Docker 编排文件
# 
# 服务：
#   backend   — FastAPI 后端服务（端口 8000）
#   frontend  — Nginx 托管前端静态文件 + 反向代理 API（端口 8080）
#
# 使用方式（dev-team/devops/ 目录执行）：
#   docker-compose -f docker-compose.yml up -d            # 启动
#   docker-compose -f docker-compose.yml down             # 停止
#   docker-compose -f docker-compose.yml logs -f          # 查看日志
#
# 原则②：所有配置通过环境变量传入，不硬编码
# 原则⑦：前端展示端口 8080
# =============================================================================

version: "3.9"

services:
  # ─── 后端服务 ───────────────────────────────────────────────────────────
  backend:
    image: stock-analysis-backend:latest
    build:
      context: ../backend-dev/stock-analysis-backend
      dockerfile: ../../devops/deploy/Dockerfile.backend
    container_name: stock-backend
    restart: unless-stopped
    ports:
      # 后端端口（默认 8000，可通过 BACKEND_PORT 环境变量修改）
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # 后端配置（所有项均通过环境变量注入，遵循原则②）
      TZ: "Asia/Shanghai"
      BACKEND_HOST: "0.0.0.0"
      BACKEND_PORT: "8000"
      BACKEND_RELOAD: "false"

      # 数据库路径（容器内部）
      DATABASE_URL: "sqlite+aiosqlite:///app/data/cache/stock.db"

      # CORS：允许前端 8080 端口访问
      CORS_ORIGINS: '["http://localhost:8080", "http://localhost"]'

      # 数据源配置
      TDX_ENABLED: "false"
      TDX_DATA_DIR: "/app/data/tdx"
      PRIMARY_DATA_SOURCE: "${PRIMARY_DATA_SOURCE:-tdx_local}"
      FALLBACK_DATA_SOURCE: "${FALLBACK_DATA_SOURCE:-sina}"

      # DeepSeek AI（生产环境必须设置）
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_API_URL: "${DEEPSEEK_API_URL:-https://api.deepseek.com/v1/chat/completions}"
      DEEPSEEK_MODEL: "${DEEPSEEK_MODEL:-deepseek-chat}"

      # 日志级别
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    volumes:
      # 数据持久化：缓存、报告、模板
      - stock-data:/app/data
      # 可选：映射通达信本地数据
      # - C:\path\to\tdx\data:/app/data/tdx:ro
    networks:
      - stock-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── 前端服务 ───────────────────────────────────────────────────────────
  frontend:
    image: stock-analysis-frontend:latest
    build:
      context: ../frontend-dev/stock-analysis-frontend
      dockerfile: ../../devops/deploy/Dockerfile.frontend
    container_name: stock-frontend
    restart: unless-stopped
    ports:
      # 前端端口（固定8080，遵循原则⑦：容器内80 → 宿主机8080）
      - "8080:80"
    environment:
      # 前端运行时环境变量（注入到 Nginx 供后续扩展使用）
      VITE_API_BASE_URL: "/api/v1"
      VITE_WS_URL: "ws://localhost:8000/ws"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - stock-network

volumes:
  stock-data:
    driver: local

networks:
  stock-network:
    driver: bridge
