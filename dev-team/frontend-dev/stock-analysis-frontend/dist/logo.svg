<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- 背景底板 -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <linearGradient id="upGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00b42a"/>
      <stop offset="100%" stop-color="#52c41a"/>
    </linearGradient>
    <linearGradient id="downGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f53f3f"/>
      <stop offset="100%" stop-color="#ff7875"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(22,93,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(22,93,255,0)"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#165dff"/>
      <stop offset="100%" stop-color="#40a9ff"/>
    </linearGradient>
  </defs>

  <!-- 圆角底板 -->
  <rect x="2" y="2" width="116" height="116" rx="28" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- 网格线（淡） -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.5">
    <line x1="20" y1="30" x2="100" y2="30"/>
    <line x1="20" y1="50" x2="100" y2="50"/>
    <line x1="20" y1="70" x2="100" y2="70"/>
    <line x1="20" y1="90" x2="100" y2="90"/>
  </g>

  <!-- K线柱1: 下跌（红色） -->
  <rect x="24" y="65" width="8" height="28" rx="1.5" fill="url(#downGrad)" opacity="0.8"/>
  <line x1="28" y1="58" x2="28" y2="65" stroke="#ff7875" stroke-width="2" stroke-linecap="round"/>

  <!-- K线柱2: 上涨（绿色） -->
  <rect x="40" y="50" width="8" height="35" rx="1.5" fill="url(#upGrad)" opacity="0.9"/>
  <line x1="44" y1="50" x2="44" y2="43" stroke="#52c41a" stroke-width="2" stroke-linecap="round"/>

  <!-- K线柱3: 小涨（绿色） -->
  <rect x="56" y="57" width="8" height="22" rx="1.5" fill="url(#upGrad)" opacity="0.8"/>
  <line x1="60" y1="57" x2="60" y2="52" stroke="#52c41a" stroke-width="2" stroke-linecap="round"/>

  <!-- K线柱4: 大涨突破（绿色，最高） -->
  <rect x="72" y="35" width="8" height="38" rx="1.5" fill="url(#upGrad)"/>
  <line x1="76" y1="35" x2="76" y2="28" stroke="#52c41a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- K线柱5: 小幅回调（红色） -->
  <rect x="88" y="45" width="8" height="24" rx="1.5" fill="url(#downGrad)" opacity="0.7"/>
  <line x1="92" y1="40" x2="92" y2="45" stroke="#ff7875" stroke-width="2" stroke-linecap="round"/>

  <!-- 趋势连线 -->
  <polyline points="28,65 44,50 60,57 76,35 92,45"
            fill="none" stroke="url(#lineGrad)" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="none"/>

  <!-- 发光区域 -->
  <rect x="72" y="55" width="8" height="18" rx="4" fill="url(#glowGrad)" opacity="0.4"/>

  <!-- 上升箭头指示 -->
  <g transform="translate(100,22)" opacity="0.6">
    <polygon points="0,8 5,0 10,8" fill="#52c41a"/>
  </g>

  <!-- 底部高光 -->
  <rect x="20" y="102" width="80" height="2" rx="1" fill="url(#lineGrad)" opacity="0.3"/>
</svg>
