<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="upGr" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00b42a"/>
      <stop offset="100%" stop-color="#52c41a"/>
    </linearGradient>
    <linearGradient id="dnGr" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f53f3f"/>
      <stop offset="100%" stop-color="#ff7875"/>
    </linearGradient>
  </defs>
  <!-- 圆底 -->
  <rect x="1" y="1" width="30" height="30" rx="8" fill="#0d1f3c"/>
  <!-- K线1 跌 -->
  <rect x="6" y="18" width="4" height="8" rx="1" fill="url(#dnGr)" opacity="0.7"/>
  <line x1="8" y1="15" x2="8" y2="18" stroke="#ff7875" stroke-width="1.5" stroke-linecap="round"/>
  <!-- K线2 涨 -->
  <rect x="14" y="11" width="4" height="12" rx="1" fill="url(#upGr)"/>
  <line x1="16" y1="11" x2="16" y2="8" stroke="#52c41a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- K线3 涨突破 -->
  <rect x="22" y="7" width="4" height="14" rx="1" fill="url(#upGr)"/>
  <line x1="24" y1="7" x2="24" y2="4" stroke="#52c41a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 趋势线 -->
  <polyline points="8,18 16,11 24,7" fill="none" stroke="#165dff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
