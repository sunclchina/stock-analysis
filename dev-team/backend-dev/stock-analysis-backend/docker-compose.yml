services:
  stock-analysis:
    build: .
    image: stock-analysis:latest
    container_name: stock-analysis
    restart: always
    ports:
      - "8081:8081"  # Docker 单端口 8081 部署
    # 生产配置在 D:/docker/stock-analysis/.env 中
    env_file:
      - D:/docker/stock-analysis/.env
    volumes:
      - D:/docker/stock-analysis/data:/app/data
      # SSL 证书挂载：把证书文件（.pem + .key）放到 D:/docker/stock-analysis/certs/ 下即可
      - D:/docker/stock-analysis/certs:/app/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/v1/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
