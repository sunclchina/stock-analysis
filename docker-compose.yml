services:
  stock-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    image: stock-analysis:latest
    container_name: stock-analysis
    restart: always
    ports:
      - "8081:8081"
    # 生产配置路径，按需修改
    env_file:
      - D:/docker/stock-analysis/.env
    volumes:
      - D:/docker/stock-analysis/data:/app/data
      # SSL 证书（可选），把 .pem/.key 放到 D:/docker/stock-analysis/certs/
      - D:/docker/stock-analysis/certs:/app/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/v1/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
