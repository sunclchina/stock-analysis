# ==========================================
# 股票分析与投资决策系统 - Docker Compose
# ==========================================
# 用法:
#   docker compose build    # 构建镜像
#   docker compose up -d    # 启动服务
#   docker compose down     # 停止服务
#   docker compose logs -f  # 查看日志

services:
  stock-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    image: stock-analysis:1.0.0
    container_name: stock-analysis
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 持久化数据库和报告数据
      - stock_data:/app/data
      # 可选：挂载通达信数据目录
      # - C:/zd_zxzq_gm:/data/tdx:ro
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - BACKEND_RELOAD=false
      - CORS_ORIGINS=["*"]
      - LOG_LEVEL=INFO
      - PRIMARY_DATA_SOURCE=sina
      - FALLBACK_DATA_SOURCE=eastmoney
      # SQLite（默认，适合轻量使用）
      # - DATABASE_URL=sqlite+aiosqlite:///./data/cache/stock.db
      # 可选：MySQL 数据库
      # - DATABASE_URL=mysql+aiomysql://user:password@host:3306/stock_db
      # 管理员账号（首次启动自动创建）
      - DEFAULT_ADMIN_USERNAME=admin
      - DEFAULT_ADMIN_PASSWORD=your_secure_password
      - DEFAULT_ADMIN_NICKNAME=系统管理员
      # DeepSeek AI（选填）
      # - DEEPSEEK_API_KEY=sk-xxx
      # 通达信本地数据目录（容器内路径）
      # - TDX_DATA_DIR=/data/tdx
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

volumes:
  stock_data:
    name: stock-analysis-data
