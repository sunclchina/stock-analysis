services:
  stock-analysis:
    image: stock-analysis:latest
    container_name: stock-analysis
    ports:
      - "8081:8081"
    volumes:
      - D:/docker/stock-analysis/data:/app/data
      - D:/docker/stock-analysis/certs:/app/certs:ro
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: >
      sh -c "echo 'precedence ::ffff:0:0/96 100' > /etc/gai.conf &&
             python -m backend.main"
    healthcheck:
      test: ["CMD-SHELL", "curl -k https://localhost:8081/api/v1/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3
    restart: unless-stopped
